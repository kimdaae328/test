<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .step > div,
        .step2 > div {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
        }
        /* .step > div::after {
            content: '';
            width: 2px;
            height: 25px;
            background: repeating-linear-gradient(
                to bottom,
                #d3d3d3 0 4px,
                transparent 4px 8px
            );
        } */
        .step > div > div {
            display: flex;
            align-items: center;
        }
        .img-box {
            position: relative;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            overflow: hidden;
        }
        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .step > div{
            position: relative;
            display: flex;
            align-items: center;
        }

        .step > div:not(:last-child):after {
            content: '';
            position: absolute;
            left: 25px;
            transform: translateX(-50%);
            top: 50px;
            height: 25px;
            border-left: 2px dashed #d3d3d3;
        }

        .step2 .img-wrap {
            position: relative;
        }

        .step2 > div:not(:last-child) .img-wrap::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 50px;
            transform: translateX(-50%);
            height: 25px;
            border-left: 2px dashed #d3d3d3;
        }
    </style>
</head>
<body>
    <div class="step">
        <div>
            <div class="img-box"><img src="icon.jpg" alt=""></div>
            <div><span>제목</span></div>
        </div>
        <div>
            <div class="img-box"><img src="icon.jpg" alt=""></div>
            <div><span>제목</span></div>
        </div>
    </div>

    <div class="step2">
        <div>
            <div class="img-wrap">
                <div class="img-box">
                    <img src="icon.jpg" alt="">
                </div>
            </div>
            <div><span>제목</span></div>
        </div>
        <div>
            <div class="img-wrap">
                <div class="img-box">
                    <img src="icon.jpg" alt="">
                </div>
            </div>
            <div><span>제목</span></div>
        </div>
    </div>
</body>
</html>
